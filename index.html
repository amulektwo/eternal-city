<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:,">
<title>THE ETERNAL CITY</title>
<style>
  :root { --gold:#d4af37; --gold-lt:#f3d98b; --ink:#5a4718; }
  * { box-sizing:border-box; }
  html,body { margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#f7ecd7; font-family:'Cormorant Garamond', Georgia, 'Times New Roman', serif; }
  canvas { display:block; touch-action:none; }
  /* ---------- start / pause overlay ---------- */
  #ov { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; cursor:pointer;
    background:radial-gradient(ellipse at 50% 38%, #fff7e2 0%, #f6e3b8 55%, #eccf95 100%);
    transition:opacity 1.1s ease; }
  #ov.hide { opacity:0; pointer-events:none; }
  #ov h1 { margin:0; font-weight:400; color:var(--ink);
    font-size:clamp(2.1rem,7vw,4.6rem); letter-spacing:.42em; text-indent:.42em;
    text-shadow:0 1px 0 #fff, 0 0 28px rgba(212,175,55,.5); }
  #ov .sub { color:#8a6400; letter-spacing:.30em; text-indent:.30em; margin:.8rem 0 0;
    font-size:clamp(.7rem,2vw,1rem); }
  #ov .rule { width:min(420px,70vw); height:1px; margin:1.6rem 0;
    background:linear-gradient(90deg,transparent,var(--gold),transparent); }
  #ov .ctl { color:#7a6430; font-size:clamp(.85rem,2.2vw,1.05rem); line-height:1.9;
    letter-spacing:.12em; padding:0 1.2rem; }
  #ov .ctl b { color:var(--ink); letter-spacing:.18em; }
  #enter { margin-top:2rem; padding:.85rem 3.2rem; font-family:inherit;
    font-size:clamp(.95rem,2.4vw,1.2rem); letter-spacing:.34em; text-indent:.34em;
    color:var(--ink); background:transparent; border:1px solid var(--gold);
    cursor:pointer; transition:all .35s; }
  #enter:hover { background:var(--gold); color:#fff; box-shadow:0 0 34px rgba(212,175,55,.65); }
  #pausemsg { display:none; }
  #ov.paused #titleblock { display:none; }
  #ov.paused #pausemsg { display:block; }
  /* ---------- HUD ---------- */
  #hud { position:fixed; top:22px; left:0; right:0; z-index:10; text-align:center;
    pointer-events:none; }
  #area { display:inline-block; color:#fff8e6; letter-spacing:.34em; text-indent:.34em;
    font-size:clamp(.9rem,2.6vw,1.35rem);
    text-shadow:0 1px 3px rgba(90,60,0,.55), 0 0 18px rgba(255,214,120,.8);
    opacity:0; transition:opacity 1.2s ease; }
  #area.on { opacity:1; }
  #area::after { content:""; display:block; margin:7px auto 0; width:120px; height:1px;
    background:linear-gradient(90deg,transparent,#ffe9ad,transparent); }
  #dot { position:fixed; top:50%; left:50%; width:4px; height:4px; margin:-2px;
    border-radius:50%; background:rgba(255,244,214,.85); z-index:10; pointer-events:none;
    box-shadow:0 0 6px rgba(255,220,130,.9); display:none; }
  #fps { position:fixed; bottom:8px; left:10px; color:#8a6400; font:12px monospace;
    z-index:10; display:none; pointer-events:none; }
  #vig { position:fixed; inset:0; z-index:5; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 66%, rgba(255,196,110,.10) 100%); }
  /* ---------- touch controls ---------- */
  #stick { position:fixed; left:26px; bottom:30px; width:120px; height:120px; z-index:15;
    border:1px solid rgba(212,175,55,.55); border-radius:50%; display:none;
    background:rgba(255,245,220,.10); }
  #knob { position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px;
    border-radius:50%; background:rgba(243,217,139,.55); border:1px solid var(--gold); }
  #err { position:fixed; inset:auto 0 0 0; z-index:40; background:#fff3f0; color:#8a2a12;
    font:13px monospace; padding:10px 14px; display:none; white-space:pre-wrap; }
</style>
</head>
<body>
<div id="vig"></div>
<div id="hud"><span id="area"></span></div>
<div id="dot"></div>
<div id="fps"></div>
<div id="stick"><div id="knob"></div></div>
<div id="err"></div>

<div id="ov">
  <div id="titleblock">
    <h1>THE ETERNAL CITY</h1>
    <div class="sub">A CITY OF WHITE MARBLE AND LIVING GOLD</div>
    <div class="rule"></div>
    <div class="ctl" id="ctlDesk">
      <b>W A S D</b> — walk &nbsp;·&nbsp; <b>MOUSE</b> — look<br>
      <b>SHIFT</b> — run &nbsp;·&nbsp; <b>SPACE</b> — jump &nbsp;·&nbsp; <b>ESC</b> — pause
    </div>
    <div class="ctl" id="ctlTouch" style="display:none">
      <b>LEFT STICK</b> — walk &nbsp;·&nbsp; <b>DRAG</b> — look
    </div>
  </div>
  <div id="pausemsg">
    <h1 style="font-size:clamp(1.4rem,4vw,2.4rem)">PAUSED</h1>
    <div class="sub">CLICK TO RETURN TO THE CITY</div>
  </div>
  <button id="enter">ENTER</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

try {

/* ================================================================
   0. CONSTANTS · HELPERS
================================================================ */
const PI = Math.PI, TAU = PI * 2, D2R = PI / 180;
const CITY_R = 130;          // foundation edge
const WALL_R = 118.5;        // outer wall centreline
const RAIL_R = 127.4;        // invisible rail before the falls
const TERR_A = 225 * D2R;    // waterfall terrace azimuth
const TERR_HALF = 18 * D2R;  // terrace floor half-angle
const TERR_OPEN = 8 * D2R;   // wall opening half-angle at terrace
const TERR_RAIL = 137.3;     // terrace railing radius
const GATE_HALF = 0.040;     // gate opening half-angle (rad)
const TRIBES = ['REUBEN','SIMEON','LEVI','JUDAH','DAN','NAPHTALI',
                'GAD','ASHER','ISSACHAR','ZEBULUN','JOSEPH','BENJAMIN'];

function mulberry32(seed){ let a = seed>>>0; return function(){
  a |= 0; a = a + 0x6D2B79F5 | 0;
  let t = Math.imul(a ^ a>>>15, 1 | a);
  t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
  return ((t ^ t>>>14) >>> 0) / 4294967296; }; }
const rng = mulberry32(144);
const rr = (a,b)=> a + (b-a)*rng();

function angOf(x,z){ let a = Math.atan2(x,z); if (a<0) a += TAU; return a; }
function angDiff(a,b){ return Math.abs(((a-b+PI*3)%TAU)-PI); }

const _m4 = new THREE.Matrix4(), _e = new THREE.Euler(),
      _v3 = new THREE.Vector3(), _q = new THREE.Quaternion(), _s3 = new THREE.Vector3();
function xf(geo, px=0,py=0,pz=0, ry=0, sx=1,sy=null,sz=null, rx=0, rz=0){
  _e.set(rx,ry,rz); _q.setFromEuler(_e);
  _s3.set(sx, sy===null?sx:sy, sz===null?sx:sz);
  _v3.set(px,py,pz);
  _m4.compose(_v3,_q,_s3); geo.applyMatrix4(_m4); return geo;
}
function canvasTex(size, fn, w){
  const c = document.createElement('canvas'); c.width = w||size; c.height = size;
  fn(c.getContext('2d'), c.width, c.height);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 4; return t;
}
/* two-centre gothic arch: pushes both arcs (local XY, apex up +Y at local x=0) */
function pushArch(list, R, tube, c, px, py, pz, ry){
  const apexAngle = Math.acos(-c/R);
  const arcLen = PI - apexAngle;
  const g1 = new THREE.TorusGeometry(R, tube, 8, 18, arcLen);
  g1.rotateZ(apexAngle); g1.translate(c, 0, 0);
  const g2 = new THREE.TorusGeometry(R, tube, 8, 18, arcLen);
  g2.translate(-c, 0, 0);
  xf(g1, px,py,pz, ry); xf(g2, px,py,pz, ry);
  list.push(g1, g2);
}

/* ================================================================
   1. TIER DETECTION  (?q=low|high overrides, ?hud=fps shows meter)
================================================================ */
const qs = new URLSearchParams(location.search);
const IS_TOUCH = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
let TIER = IS_TOUCH ? 1 : 2;                    // 2=high 1=mid 0=low
if (qs.get('q') === 'low') TIER = 0;
if (qs.get('q') === 'high') TIER = 2;
const HIGH = TIER >= 2;

/* ================================================================
   2. RENDERER · SCENE · CAMERA · LIGHT
================================================================ */
const renderer = new THREE.WebGLRenderer({ antialias: TIER>0, powerPreference:'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, TIER===2?2:(TIER===1?1.5:1)));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;
if (HIGH){ renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap; }
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xffd9a4, 150, TIER===0 ? 480 : 780);

const camera = new THREE.PerspectiveCamera(74, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0, 1.7, 108);

const hemi = new THREE.HemisphereLight(0xfff0d4, 0xd8ba8c, 0.45);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffd9a0, 3.3);
sun.position.set(-180, 90, 150);
if (HIGH){
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  const sc = sun.shadow.camera;
  sc.left = -150; sc.right = 150; sc.top = 150; sc.bottom = -150;
  sc.near = 20; sc.far = 600;
  sun.shadow.bias = -0.0004; sun.shadow.normalBias = 0.5;
}
scene.add(sun); scene.add(sun.target);

/* environment map (procedural golden sky) so gold truly lives */
{
  const envC = canvasTex(256, (g,w,h)=>{
    const gr = g.createLinearGradient(0,0,0,h);
    gr.addColorStop(0,'#dfeaff'); gr.addColorStop(.45,'#ffe9c0');
    gr.addColorStop(.62,'#ffd089'); gr.addColorStop(1,'#f7e2b6');
    g.fillStyle = gr; g.fillRect(0,0,w,h);
    const s = g.createRadialGradient(w*.72,h*.5,4, w*.72,h*.5,110);
    s.addColorStop(0,'rgba(255,255,240,1)'); s.addColorStop(.25,'rgba(255,230,160,.85)');
    s.addColorStop(1,'rgba(255,230,160,0)');
    g.fillStyle = s; g.fillRect(0,0,w,h);
  }, 512);
  envC.mapping = THREE.EquirectangularReflectionMapping;
  const pm = new THREE.PMREMGenerator(renderer);
  scene.environment = pm.fromEquirectangular(envC).texture;
  pm.dispose();
}

/* post-processing */
let composer = null, bloomPass = null;
if (TIER > 0){
  composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.30, 0.5, 1.0);
  composer.addPass(bloomPass);
  composer.addPass(new OutputPass());
}

/* ================================================================
   3. TEXTURES · MATERIALS · SHARED LISTS
================================================================ */
const marbleTex = canvasTex(512, (g,w,h)=>{
  g.fillStyle = '#f6f1e6'; g.fillRect(0,0,w,h);
  for (let i=0;i<46;i++){
    g.strokeStyle = `rgba(${175+rng()*40|0},${160+rng()*35|0},${130+rng()*30|0},${.05+rng()*.08})`;
    g.lineWidth = .6 + rng()*1.6; g.beginPath();
    let x = rng()*w, y = rng()*h; g.moveTo(x,y);
    for (let k=0;k<7;k++){ x += rr(-70,70); y += rr(-70,70); g.lineTo(x,y); }
    g.stroke();
  }
  for (let i=0;i<300;i++){
    g.fillStyle = `rgba(255,255,255,${rng()*.07})`;
    g.fillRect(rng()*w, rng()*h, rr(4,26), rr(4,26));
  }
});
marbleTex.wrapS = marbleTex.wrapT = THREE.RepeatWrapping;

const pavingTex = canvasTex(1024, (g,w,h)=>{
  g.fillStyle = '#f0e7d2'; g.fillRect(0,0,w,h);
  const cx=w/2, cy=h/2;
  for (let r=26; r<w*.71; r+=34){
    g.strokeStyle = 'rgba(196,166,104,.28)'; g.lineWidth = 2.4;
    g.beginPath(); g.arc(cx,cy,r,0,TAU); g.stroke();
  }
  for (let i=0;i<48;i++){
    const a = i/48*TAU;
    g.strokeStyle = 'rgba(205,178,120,.14)'; g.lineWidth = 1.6;
    g.beginPath(); g.moveTo(cx,cy);
    g.lineTo(cx+Math.cos(a)*w, cy+Math.sin(a)*w); g.stroke();
  }
  g.strokeStyle = 'rgba(212,175,55,.55)'; g.lineWidth = 7;
  g.beginPath(); g.arc(cx,cy,60,0,TAU); g.stroke();
  for (let i=0;i<900;i++){
    g.fillStyle = `rgba(190,168,120,${rng()*.05})`;
    g.fillRect(rng()*w, rng()*h, rr(3,14), rr(3,14));
  }
});

const cloudTexSprite = canvasTex(256, (g,w,h)=>{
  /* cumulus: dense flat-bottomed core, soft top */
  for (let i=0;i<16;i++){
    const x = w*.5 + rr(-70,70), y = h*.62 + rr(-14,6), r = rr(26,48);
    const gr = g.createRadialGradient(x,y-6,2,x,y,r);
    gr.addColorStop(0,'rgba(255,252,244,.85)'); gr.addColorStop(.55,'rgba(255,248,234,.45)');
    gr.addColorStop(1,'rgba(255,248,234,0)');
    g.fillStyle = gr; g.beginPath(); g.arc(x,y,r,0,TAU); g.fill();
  }
  for (let i=0;i<8;i++){
    const x = w*.5 + rr(-46,46), y = h*.45 + rr(-16,8), r = rr(20,36);
    const gr = g.createRadialGradient(x,y,2,x,y,r);
    gr.addColorStop(0,'rgba(255,255,250,.9)'); gr.addColorStop(1,'rgba(255,255,250,0)');
    g.fillStyle = gr; g.beginPath(); g.arc(x,y,r,0,TAU); g.fill();
  }
});
const glowTex = canvasTex(128, (g,w,h)=>{
  const gr = g.createRadialGradient(w/2,h/2,1,w/2,h/2,w/2);
  gr.addColorStop(0,'rgba(255,255,255,1)'); gr.addColorStop(.35,'rgba(255,255,255,.45)');
  gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle = gr; g.fillRect(0,0,w,h);
});
const noiseTex = canvasTex(256, (g,w,h)=>{
  g.clearRect(0,0,w,h);
  for (let i=0;i<420;i++){
    const x=rng()*w, y=rng()*h, r=rr(8,34);
    const gr = g.createRadialGradient(x,y,1,x,y,r);
    gr.addColorStop(0,`rgba(255,255,255,${rr(.05,.16)})`); gr.addColorStop(1,'rgba(255,255,255,0)');
    g.fillStyle = gr; g.beginPath(); g.arc(x,y,r,0,TAU); g.fill();
  }
});
noiseTex.wrapS = noiseTex.wrapT = THREE.RepeatWrapping;

const canopyStripeTex = canvasTex(128, (g,w,h)=>{
  for (let i=0;i<8;i++){
    g.fillStyle = i%2 ? '#f7ead0' : '#e2b74e';
    g.fillRect(i*w/8, 0, w/8, h);
  }
});
const bannerTex = canvasTex(256, (g,w,h)=>{
  g.fillStyle = '#c8502e'; g.fillRect(0,0,w,h);
  g.strokeStyle = '#f3d98b'; g.lineWidth = 14; g.strokeRect(10,10,w-20,h-20);
  g.fillStyle = '#f3d98b'; g.beginPath(); g.arc(w/2,h/2,44,0,TAU); g.fill();
  g.fillStyle = '#c8502e'; g.beginPath(); g.arc(w/2,h/2,30,0,TAU); g.fill();
  g.fillStyle = '#f3d98b'; g.beginPath(); g.arc(w/2,h/2,12,0,TAU); g.fill();
}, 128);

const roseTex = canvasTex(512, (g,w,h)=>{
  const cx=w/2, cy=h/2, R=w/2-6;
  const cols = ['#ffd98f','#ffb87a','#ffe7b0','#e88a6a','#cfe0ff','#ffcf6e'];
  for (let i=0;i<12;i++){
    const a0 = i/12*TAU, a1 = (i+1)/12*TAU;
    g.fillStyle = cols[i%cols.length];
    g.beginPath(); g.moveTo(cx,cy); g.arc(cx,cy,R,a0,a1); g.closePath(); g.fill();
  }
  g.fillStyle = '#fff3cf'; g.beginPath(); g.arc(cx,cy,R*.3,0,TAU); g.fill();
  g.strokeStyle = '#b8912f'; g.lineWidth = 8;
  for (let i=0;i<12;i++){
    const a = i/12*TAU;
    g.beginPath(); g.moveTo(cx,cy); g.lineTo(cx+Math.cos(a)*R, cy+Math.sin(a)*R); g.stroke();
  }
  g.lineWidth = 12; g.beginPath(); g.arc(cx,cy,R-6,0,TAU); g.stroke();
  g.beginPath(); g.arc(cx,cy,R*.3,0,TAU); g.stroke();
});

const MAT = {
  white:  new THREE.MeshStandardMaterial({ color:0xf8f4ea, map:marbleTex, roughness:.48, metalness:.04, envMapIntensity:.62 }),
  ivory:  new THREE.MeshStandardMaterial({ color:0xf3ecd8, roughness:.62, metalness:.03, envMapIntensity:.4 }),
  gold:   new THREE.MeshStandardMaterial({ color:0xffc964, roughness:.26, metalness:1.0, envMapIntensity:1.25 }),
  goldSt: new THREE.MeshStandardMaterial({ color:0xf5c569, roughness:.34, metalness:.95, envMapIntensity:1.0,
            polygonOffset:true, polygonOffsetFactor:-1, polygonOffsetUnits:-1 }),
  pearl:  new THREE.MeshPhysicalMaterial({ color:0xfdfaf4, roughness:.16, metalness:.1,
            clearcoat:.85, clearcoatRoughness:.22, envMapIntensity:1.4 }),
  glow:   new THREE.MeshStandardMaterial({ color:0xfff3d2, emissive:0xffd98a, emissiveIntensity:2.1, roughness:.4 }),
  glowHot:new THREE.MeshStandardMaterial({ color:0xfff8e8, emissive:0xffe9b0, emissiveIntensity:3.4, roughness:.3 }),
  crimson:new THREE.MeshStandardMaterial({ color:0xc8502e, roughness:.7, metalness:0,
            polygonOffset:true, polygonOffsetFactor:-2, polygonOffsetUnits:-2 }),
  leaf:   new THREE.MeshStandardMaterial({ color:0xe9c66c, emissive:0x8a6400, emissiveIntensity:.28, roughness:.55 }),
};

/* shared animated/registry lists */
const tickers = [], nameplates = [], banners = [], waterDiscs = [],
      flames = [], glows = [], beams = [], particleMeshes = [], fruits = [];
let canopyShells = [], canopyPts = null, sprayMat = null;
function mkGlow(x,y,z,s,color,op){
  const m = new THREE.Sprite(new THREE.SpriteMaterial({
    map:glowTex, color, transparent:true, opacity:op,
    blending:THREE.AdditiveBlending, depthWrite:false }));
  m.scale.set(s,s,1); m.position.set(x,y,z);
  scene.add(m); return m;
}

/* ================================================================
   4. SKY · SUN · GOD-RAYS · CLOUDS · DISTANT SPIRES · MOTES
================================================================ */
const skyUni = { uSunDir: { value: new THREE.Vector3(-.6,.28,.75).normalize() } };
{
  const skyMat = new THREE.ShaderMaterial({
    uniforms: skyUni, side: THREE.BackSide, depthWrite:false,
    vertexShader: `
      varying vec3 vDir;
      void main(){
        vDir = normalize(position);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }`,
    fragmentShader: `
      uniform vec3 uSunDir; varying vec3 vDir;
      void main(){
        float h = clamp(vDir.y, -0.08, 1.0);
        vec3 zen = vec3(0.56, 0.73, 0.96);
        vec3 hor = vec3(1.00, 0.82, 0.55);
        vec3 col = mix(hor, zen, pow(max(h,0.0), 0.62));
        float sd = max(dot(vDir, uSunDir), 0.0);
        col += vec3(1.0, 0.82, 0.52) * pow(sd, 7.0) * 0.30;
        col += vec3(1.0, 0.92, 0.72) * pow(sd, 90.0) * 1.1;
        col += vec3(1.0, 0.98, 0.90) * pow(sd, 1200.0) * 4.0;
        col = mix(col, vec3(1.0,0.89,0.70), smoothstep(0.10,-0.08,vDir.y)*0.9);
        gl_FragColor = vec4(col, 1.0);
      }`
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(900, 32, 20), skyMat));
}
const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({
  map:glowTex, color:0xfff2cc, transparent:true, opacity:.95, fog:false,
  blending:THREE.AdditiveBlending, depthWrite:false }));
sunSprite.scale.set(230,230,1);
scene.add(sunSprite);

/* god-ray planes fanned along the sun direction — soft, slowly breathing */
{
  const grMat = new THREE.ShaderMaterial({
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, side:THREE.DoubleSide,
    uniforms:{ uOp:{value:.07}, uTime:{value:0} },
    vertexShader:`varying vec2 vUv; void main(){ vUv=uv;
      gl_Position = projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`uniform float uOp; uniform float uTime; varying vec2 vUv;
      void main(){
        float a = uOp * (1.0-abs(vUv.x*2.0-1.0)) * smoothstep(0.0,0.25,vUv.y) * smoothstep(1.0,0.55,vUv.y);
        a *= 0.72 + 0.28*sin(uTime*0.35 + vUv.y*4.0 + vUv.x*2.0);
        gl_FragColor = vec4(1.0, 0.90, 0.66, a);
      }`
  });
  for (let i=0;i<8;i++){
    const w = rr(26,64);
    const p = new THREE.Mesh(new THREE.PlaneGeometry(w, 520, 1, 8), grMat);
    const off = rr(-140,140);
    p.position.set(-120+off*.6, 180, 60+off*.4);

/* ================================================================
   6.5  HERO SLOTS — GLB drop-in system
   assets/models/manifest.json (optional), one entry per slot:
     { "slot": "treeOfLife" | "throne" | "fountain" | "gateArch" | "angelStatue",
       "file": "assets/models/<name>.glb", "scale": 1.0, "yOffset": 0 }
   A present entry loads its GLB at every anchor of that slot and hides
   the procedural hero. Missing manifest / missing file / bad JSON →
   silent fallback; a present-but-unloadable file falls back too, with
   a console.warn. Exactly one status line per slot, always.
   Draco / KTX2-compressed GLBs are supported (decoders load lazily).
   AUTHORING FRAMES — each anchor equals the procedural hero's local
   origin, so author the model in that frame:
     treeOfLife  ground centre of the plaza; canopy centre ≈ y30.
                 NOTE: the 12 red fruit are persistent gameplay
                 entities on a fixed ring (r≈10.4, y≈24-27) that stay
                 visible — author the canopy to embrace them.
     throne      dais top under each seat (placed twice, ±1.5 apart).
     fountain    court ground at the basin centre.
     gateArch    the SPRING LINE of the arch (y=8.4 world). Model the
                 floating arch band only — the flanking pylons are
                 baked city fabric and remain.
     angelStatue plinth base (placed at all 8 portal positions).
================================================================ */
const SLOT_NAMES = ['treeOfLife','throne','fountain','gateArch','angelStatue'];
const HEROES = {}, SLOT_STATUS = {};
function registerHero(slot, group, anchors){ HEROES[slot] = { group, anchors }; }
async function initSlots(){
  const entries = {};
  try {
    const res = await fetch('assets/models/manifest.json', { cache:'no-store' });
    if (res.ok){
      const list = await res.json();
      if (Array.isArray(list))
        for (const e of list) if (e && e.slot && e.file) entries[e.slot] = e;
    }
  } catch(err){ /* no manifest — the city stands procedural */ }

  /* loaders are fetched only when a manifest entry actually asks for a GLB */
  let loader = null, cloneRig = null;
  if (SLOT_NAMES.some(s => entries[s] && HEROES[s])){
    try {
      const [gltfM, dracoM, ktx2M, skelM] = await Promise.all([
        import('three/addons/loaders/GLTFLoader.js'),
        import('three/addons/loaders/DRACOLoader.js'),
        import('three/addons/loaders/KTX2Loader.js'),
        import('three/addons/utils/SkeletonUtils.js'),
      ]);
      loader = new gltfM.GLTFLoader();
      const draco = new dracoM.DRACOLoader();
      draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/gltf/');
      loader.setDRACOLoader(draco);
      loader.setKTX2Loader(new ktx2M.KTX2Loader()
        .setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/basis/')
        .detectSupport(renderer));
      cloneRig = skelM.clone;   /* rig-safe clone — plain Object3D.clone breaks skinned meshes */
    } catch(err){
      console.warn('SLOT loaders unavailable — all slots stay procedural:', err);
      loader = null;
    }
  }

  for (const slot of SLOT_NAMES){
    const hero = HEROES[slot], entry = entries[slot];
    let status = 'PROCEDURAL';
    if (hero && entry && loader){
      try {
        const gltf = await loader.loadAsync(entry.file);
        const src = gltf.scene;
        src.traverse(o=>{
          if (o.isMesh){
            o.castShadow = HIGH; o.receiveShadow = HIGH;
            const ms = Array.isArray(o.material) ? o.material : [o.material];
            for (const m of ms) if (m && m.envMapIntensity !== undefined) m.envMapIntensity = 1.0;
          }
        });
        const sc = (typeof entry.scale === 'number') ? entry.scale : 1;
        const yo = (typeof entry.yOffset === 'number') ? entry.yOffset : 0;
        for (const anc of hero.anchors){
          const inst = cloneRig(src);
          inst.position.set(anc.x, (anc.y||0) + yo, anc.z);
          inst.rotation.y = anc.ry || 0;
          inst.scale.setScalar(sc);
          scene.add(inst);
        }
        hero.group.visible = false;
        status = 'GLB';
      } catch(err){
        console.warn(`SLOT ${slot}: GLB failed to load (${entry.file}) — falling back to procedural.`, err);
        status = 'PROCEDURAL';
      }
    }
    SLOT_STATUS[slot] = status;
    console.log(`SLOT ${slot}: ${status}`);
  }
}

  const heroGate = new THREE.Group(); scene.add(heroGate);
  {
    const SPRING = 8.4, C = 2.6, RO = 8.6, RI = 7.0, NSEG = 22;
    /* two-centre pointed-arch band as a flat Shape (apex up +Y, spring line y=0) */
    const bandShape = (Ro, Ri)=>{
      const aO = Math.acos(C/Ro), aI = Math.acos(C/Ri);

      for (let i=1;i<=NSEG;i++){ const a=aO*i/NSEG; s.lineTo(-C+Ro*Math.cos(a), Ro*Math.sin(a)); }
      for (let i=NSEG;i>=1;i--){ const a=aO*i/NSEG; s.lineTo(C-Ro*Math.cos(a), Ro*Math.sin(a)); }

    const rimG = mergeGeometries([rimOut, rimIn, finG.toNonIndexed(), knobG.toNonIndexed()]);
    const archBody = new THREE.InstancedMesh(bodyG, MAT.pearl, 12);
    const archRim  = new THREE.InstancedMesh(rimG, MAT.gold, 12);
    const gd = new THREE.Object3D();
    const gateAnchors = [];
    for (let k=0;k<12;k++){

      gd.position.set(Math.sin(a)*WALL_R, SPRING, Math.cos(a)*WALL_R);
      gd.rotation.set(0, a, 0); gd.updateMatrix();
      archBody.setMatrixAt(k, gd.matrix);
      archRim.setMatrixAt(k, gd.matrix);
      /* anchor = the procedural band's frame: the spring line, y=SPRING */
      gateAnchors.push({ x:Math.sin(a)*WALL_R, y:SPRING, z:Math.cos(a)*WALL_R, ry:a });
    }
    archBody.castShadow = HIGH; archBody.receiveShadow = HIGH;
    archRim.castShadow = HIGH;  archRim.receiveShadow = HIGH;
    archBody.frustumCulled = archRim.frustumCulled = false;
    heroGate.add(archBody, archRim);
    registerHero('gateArch', heroGate, gateAnchors);
  }

   9. DISTRICTS — gothic backdrop, seeded + deterministic
================================================================ */
const reserved = [
  { c:[0,0],    r:30 },
  { c:[-52,8],  r:23 },
  { c:[0,-72],  r:27 },
  { c:[0,100],  r:21 },
];
const reservedRects = [
  [-10,10, 28,92],
  [-10,10, -60,-24],
  [24,45, -14,2],
  [-44,-22, 0,16],
  [36,92, -28,16],
];
function isReserved(x,z,m){
  for (const q of reserved){
    const dx=x-q.c[0], dz=z-q.c[1];
    if (dx*dx+dz*dz < (q.r+m)*(q.r+m)) return true;
  }
  for (const r of reservedRects)
    if (x>r[0]-m && x<r[1]+m && z>r[2]-m && z<r[3]+m) return true;
  const a = angOf(x,z);
  for (let k=0;k<12;k++) if (angDiff(a,k*PI/6) < .07 && Math.hypot(x,z) > 58) return true;

}

function addBuilding(x,z,ry,big){
  const w = rr(6,11)*(big?1.25:1), dpt = rr(6,11)*(big?1.25:1), h = rr(9,20)*(big?1.35:1);
  P.white.push(xf(new THREE.BoxGeometry(w,h,dpt), x, h/2, z, ry));
  P.gold.push(xf(new THREE.BoxGeometry(w+.5,.45,dpt+.5), x, h, z, ry));
  const roofH = h*.42;
  P.ivory.push(xf(new THREE.ConeGeometry(Math.max(w,dpt)*.74, roofH, 4), x, h+roofH/2, z, ry+PI/4));
  P.gold.push(xf(new THREE.ConeGeometry(.5,1.6,4), x, h+roofH+.7, z, ry));
  const rows = Math.max(2, h/5|0), cols = Math.max(2, w/3|0);
  for (let rI=0;rI<rows;rI++) for (let c=0;c<cols;c++){
    const lx = -w/2 + (c+.5)*(w/cols), ly = 2.5 + rI*(h-4)/rows;
    const wx = x + Math.cos(ry)*lx + Math.sin(ry)*(dpt/2+.06);
    const wz = z - Math.sin(ry)*lx + Math.cos(ry)*(dpt/2+.06);
    P.glow.push(xf(new THREE.PlaneGeometry(.8,1.9), wx, ly, wz, ry));
  }
  if (rng() < .3){
    const sh = h + rr(7,15);
    const sxp = x + Math.cos(ry)*(w/2-.8) + Math.sin(ry)*(dpt/2-.8);
    const szp = z - Math.sin(ry)*(w/2-.8) + Math.cos(ry)*(dpt/2-.8);
    P.white.push(xf(new THREE.CylinderGeometry(.9,1.2,sh,6), sxp, sh/2, szp));
    P.ivory.push(xf(new THREE.ConeGeometry(1.25,4.5,6), sxp, sh+2.2, szp));
    P.gold.push(xf(new THREE.ConeGeometry(.35,1.8,6), sxp, sh+5.1, szp));
  }
  addCircle(x, z, Math.hypot(w,dpt)*.52);
}

function groundAt(x,z){
  let h = -Infinity;
  if (Math.hypot(x,z) <= CITY_R) h = 0;
  for (const p of platforms){ const v = p(x,z); if (v > h) h = v; }
  return h;
}

function resolveCollisions(px, pz, prevR){
  const PR = .55;
  for (const b of colBoxes){
    const nx = Math.max(b.x0, Math.min(px, b.x1));
    const nz = Math.max(b.z0, Math.min(pz, b.z1));
    const dx = px-nx, dz = pz-nz, d2 = dx*dx+dz*dz;
    if (d2 < PR*PR){
      if (d2 > 1e-6){
        const d = Math.sqrt(d2);
        px = nx + dx/d*PR; pz = nz + dz/d*PR;
      } else {
        const cx = (b.x0+b.x1)/2, cz = (b.z0+b.z1)/2;
        const ox = px-cx, oz = pz-cz;
        if (Math.abs(ox)*((b.z1-b.z0)/2) > Math.abs(oz)*((b.x1-b.x0)/2))
          px = ox>0 ? b.x1+PR : b.x0-PR;
        else pz = oz>0 ? b.z1+PR : b.z0-PR;
      }
    }
  }
  for (const c of colCircles){
    const dx = px-c.x, dz = pz-c.z, rad = c.r+PR;
    const d2 = dx*dx+dz*dz;
    if (d2 < rad*rad && d2 > 1e-8){
      const d = Math.sqrt(d2);
      px = c.x + dx/d*rad; pz = c.z + dz/d*rad;
    }
  }
  for (const s of colSegs){
    const ex = s.bx-s.ax, ez = s.bz-s.az;
    const L2 = ex*ex+ez*ez;
    let t = ((px-s.ax)*ex + (pz-s.az)*ez) / L2;
    t = Math.max(0, Math.min(1, t));
    const qx = s.ax+ex*t, qz = s.az+ez*t;
    const dx = px-qx, dz = pz-qz, rad = s.r+PR;
    const d2 = dx*dx+dz*dz;
    if (d2 < rad*rad && d2 > 1e-8){
      const d = Math.sqrt(d2);
      px = qx + dx/d*rad; pz = qz + dz/d*rad;
    }
  }
  /* city wall ring with openings */
  {
    const r = Math.hypot(px,pz);
    const a = angOf(px,pz);
    const IN = WALL_R-1.65, OUT = WALL_R+1.65;
    if (r > IN-PR && r < OUT+PR){
      let open = angDiff(a,TERR_A) < TERR_OPEN - .012;
      for (let k=0;k<12 && !open;k++) if (angDiff(a,k*PI/6) < GATE_HALF - .006) open = true;
      if (!open){
        const target = prevR < WALL_R ? IN-PR : OUT+PR;
        const sc = target / (r||1e-6);
        px *= sc; pz *= sc;
      }
    }
  }
  /* the invisible rail before the falls */
  {
    const r = Math.hypot(px,pz);
    const a = angOf(px,pz);
    const lim = (angDiff(a,TERR_A) < TERR_HALF) ? TERR_RAIL-.5 : RAIL_R;
    if (r > lim){
      const sc = lim / r;
      px *= sc; pz *= sc;
    }
  }
  /* throne hall wall ring */
  {
    const hx = px, hz = pz+72;
    const r = Math.hypot(hx,hz);
    if (r > 17-1.1-PR && r < 17+1.1+PR){
      const a = Math.atan2(hx,hz);
      if (Math.abs(a) > 24*D2R){
        const target = (Math.hypot(player.pos.x, player.pos.z+72) < 17) ? 17-1.1-PR : 17+1.1+PR;
        const sc = target / (r||1e-6);
        px = hx*sc; pz = hz*sc - 72;
      }
    }
  }
  return [px,pz];
}

let dragLook = false, lastX=0, lastY=0;
document.addEventListener('pointerlockchange', ()=>{
  const locked = document.pointerLockElement === canvasEl;
  if (!locked && started && !IS_TOUCH){ paused = true; showOverlay(true); }
});
addEventListener('mousemove', e=>{
  if (!started || paused) return;
  if (document.pointerLockElement === canvasEl){
    player.yaw   -= e.movementX * .0022;
    player.pitch -= e.movementY * .0022;
  } else if (dragLook){
    player.yaw   -= (e.clientX-lastX) * .004;
    player.pitch -= (e.clientY-lastY) * .004;
    lastX = e.clientX; lastY = e.clientY;
  }
  player.pitch = Math.max(-1.45, Math.min(1.45, player.pitch));
});
canvasEl.addEventListener('mousedown', e=>{
  if (!started || paused) return;
  if (document.pointerLockElement !== canvasEl){
    dragLook = true; lastX=e.clientX; lastY=e.clientY;
    /* retry the lock — covers Chrome's post-ESC cooldown rejection */
    if (!IS_TOUCH){
      try {
        const r = canvasEl.requestPointerLock();
        if (r && r.catch) r.catch(()=>{});
      } catch(err){}
    }
  }
});
addEventListener('mouseup', ()=> dragLook=false);

/* touch controls */
const stick = document.getElementById('stick'), knob = document.getElementById('knob');
const touchMove = {x:0, y:0};
let moveTouchId = null, lookTouchId = null, lookLX=0, lookLY=0, stickCX=0, stickCY=0;
if (IS_TOUCH){
  addEventListener('touchstart', e=>{
    if (!started) return;
    for (const t of e.changedTouches){
      if (t.clientX < innerWidth*.45 && moveTouchId===null){
        moveTouchId = t.identifier;
        stickCX = t.clientX; stickCY = t.clientY;
        stick.style.left = (stickCX-60)+'px'; stick.style.top = (stickCY-60)+'px';
        stick.style.bottom = 'auto';
      } else if (lookTouchId===null){
        lookTouchId = t.identifier; lookLX = t.clientX; lookLY = t.clientY;
      }
    }
    e.preventDefault();
  }, {passive:false});
  addEventListener('touchmove', e=>{
    for (const t of e.changedTouches){
      if (t.identifier === moveTouchId){
        let dx = (t.clientX-stickCX)/48, dy = (t.clientY-stickCY)/48;
        const m = Math.hypot(dx,dy);
        if (m>1){ dx/=m; dy/=m; }
        touchMove.x = dx; touchMove.y = dy;
        knob.style.transform = `translate(${dx*34}px,${dy*34}px)`;
      } else if (t.identifier === lookTouchId){
        player.yaw   -= (t.clientX-lookLX)*.005;
        player.pitch -= (t.clientY-lookLY)*.005;
        player.pitch = Math.max(-1.45, Math.min(1.45, player.pitch));
        lookLX = t.clientX; lookLY = t.clientY;
      }
    }
    e.preventDefault();
  }, {passive:false});
  const endTouches = e=>{
    for (const t of e.changedTouches){
      if (t.identifier === moveTouchId){ moveTouchId=null; touchMove.x=touchMove.y=0;
        knob.style.transform='translate(0,0)'; }
      if (t.identifier === lookTouchId) lookTouchId=null;
    }
  };
  addEventListener('touchend', endTouches);
  addEventListener('touchcancel', endTouches);  // OS gestures end touches with cancel, not end
}

function stepPlayer(dt){
  if (!started || paused) return;
  const run = keys['ShiftLeft']||keys['ShiftRight'];
  const sp = (run?11.5:6) * dt;
  let mx=0, mz=0;
  if (keys['KeyW']||keys['ArrowUp']) mz -= 1;
  if (keys['KeyS']||keys['ArrowDown']) mz += 1;
  if (keys['KeyA']||keys['ArrowLeft']) mx -= 1;
  if (keys['KeyD']||keys['ArrowRight']) mx += 1;
  mx += touchMove.x; mz += touchMove.y;
  const m = Math.hypot(mx,mz);
  if (m>1){ mx/=m; mz/=m; }
  const sy = Math.sin(player.yaw), cy = Math.cos(player.yaw);
  const prevR = Math.hypot(player.pos.x, player.pos.z);
  /* forward = (-sin yaw, -cos yaw); right = (cos yaw, -sin yaw) */
  let nx = player.pos.x + ((-sy)*(-mz) + cy*mx) * sp;
  let nz = player.pos.z + ((-cy)*(-mz) + (-sy)*mx) * sp;
  [nx,nz] = resolveCollisions(nx,nz,prevR);
  const gH = groundAt(nx,nz);
  const feet = player.pos.y - 1.7;
  if (player.onGround && keys['Space']){ player.velY = 8.2; player.onGround = false; }
  player.velY -= 23 * dt;
  let ny = player.pos.y + player.velY * dt;
  if (gH > -1e8){
    if (player.onGround && gH - feet <= .62 && gH >= feet - .62 && player.velY <= 0){
      ny = gH + 1.7; player.velY = 0;
    }
    if (ny - 1.7 <= gH){
      ny = gH + 1.7; player.velY = 0; player.onGround = true;
    } else if (ny - 1.7 > gH + .05) player.onGround = false;
  }
  if (ny < -18){ nx=0; nz=108; ny=1.7; player.velY=0; }
  player.pos.set(nx, ny, nz);
  const bob = (m>0.05 && player.onGround) ? Math.sin(performance.now()*.011)*(run?.05:.028) : 0;
  camera.position.set(nx, ny + bob, nz);
  camera.rotation.set(0,0,0);
  camera.rotateY(player.yaw);
  camera.rotateX(player.pitch);
}

/* ================================================================
   19. HUD · OVERLAY · POINTER LOCK
================================================================ */
const ovEl = document.getElementById('ov');
const areaEl = document.getElementById('area');
const dotEl = document.getElementById('dot');
let curArea = '';
function checkArea(){
  const {x,z} = player.pos;
  for (const a of AREAS){
    if (a.t(x,z)){
      if (a.n !== curArea){
        curArea = a.n;
        areaEl.textContent = a.n;
        areaEl.classList.remove('on');
        void areaEl.offsetWidth;
        areaEl.classList.add('on');
      }
      return;
    }
  }
}
function showOverlay(isPause){
  ovEl.classList.toggle('paused', !!isPause);
  ovEl.classList.remove('hide');
  dotEl.style.display = 'none';
}
if (IS_TOUCH){
  document.getElementById('ctlDesk').style.display='none';
  document.getElementById('ctlTouch').style.display='block';
}
function begin(){
  paused = false;
  ovEl.classList.add('hide');
  dotEl.style.display = 'block';
  if (IS_TOUCH) stick.style.display = 'block';
  if (!started){ started = true; }
  if (!IS_TOUCH){
    try {
      const r = canvasEl.requestPointerLock();
      if (r && r.catch) r.catch(()=>{ /* drag-look fallback */ });
    } catch(e){ /* drag-look fallback */ }
  }
}
document.getElementById('enter').addEventListener('click', e=>{ e.stopPropagation(); begin(); });
ovEl.addEventListener('click', ()=>{ if (started) begin(); });

/* ================================================================
   20. AUDIO — intentionally silent for now.
   The Seer will bring the true sound of the city in a later phase.
================================================================ */

/* ================================================================
   21. DAY CYCLE · ANIMATE · ADAPTIVE QUALITY
================================================================ */
const clock = new THREE.Clock();
let fpsAcc=0, fpsN=0, fpsAvg=60, lastDegrade=0, degradeStep=0;
const fpsEl = document.getElementById('fps');
if (qs.get('hud')==='fps') fpsEl.style.display='block';

function degrade(now){
  /* advance until a step actually applies on this tier — no-op steps must not burn cooldowns */
  while (degradeStep < 3){
    degradeStep++;
    if (degradeStep===1 && bloomPass){ bloomPass.enabled = false; break; }
    if (degradeStep===2 && renderer.shadowMap.enabled){
      renderer.shadowMap.enabled = false; sun.castShadow = false;
      scene.traverse(o=>{ if (o.material && o.material.needsUpdate !== undefined) o.material.needsUpdate = true; });
      break;
    }
    if (degradeStep===3){
      renderer.setPixelRatio(1);
      for (const p of particleMeshes) p.visible = false;
      scene.fog.far = 360;
      break;
    }
  }
  lastDegrade = now;
}

const _sd = new THREE.Vector3();
let frameI = 0;
function animate(){
  const dt = Math.min(clock.getDelta(), .05);
  const t = clock.elapsedTime;
  frameI++;

  stepPlayer(dt);

  /* a sun that never leaves golden hour */
  const cyc = t/240*TAU;
  const el = (16 + 5*Math.sin(cyc)) * D2R;
  const az = (232 + 9*Math.sin(cyc*.7)) * D2R;
  _sd.set(Math.sin(az)*Math.cos(el), Math.sin(el), Math.cos(az)*Math.cos(el));
  skyUni.uSunDir.value.copy(_sd);
  sun.position.copy(_sd).multiplyScalar(320);
  sun.color.setHSL(.09 + .015*Math.sin(cyc), .52, .78);
  sunSprite.position.copy(_sd).multiplyScalar(780);
  renderer.toneMappingExposure = 0.95 + .04*Math.sin(cyc*.5);

  /* living things */
  for (const fn of tickers) fn(t, dt);
  motesMat.uniforms.uTime.value = t;
  if (sprayMat) sprayMat.uniforms.uTime.value = t;
  if (canopyPts) canopyPts.material.uniforms.uTime.value = t;
  for (const s of canopyShells) s.material.uniforms.uTime.value = t;
  for (const b of beams) b.material.uniforms.uTime.value = t;
  for (const f of fruits){
    f.rotation.x = Math.sin(t*.7 + f.userData.ph)*.055;
    f.rotation.z = Math.cos(t*.55 + f.userData.ph)*.055;
    f.userData.mat.emissiveIntensity = 1.7 + .8*Math.sin(t*1.35 + f.userData.ph);
    f.userData.glow.material.opacity = .3 + .18*Math.sin(t*1.35 + f.userData.ph);
  }
  for (const b of banners){
    b.rotation.z = Math.sin(t*1.1 + b.userData.ph)*.09;
    b.rotation.x = Math.sin(t*0.8 + b.userData.ph*1.7)*.05;
  }
  for (const w of waterDiscs) w.rotation.y = t*.22;
  for (const f of flames){
    const s = 1 + .16*Math.sin(t*9 + f.position.x);
    f.scale.set(s, s*1.15, s);
  }
  for (const c of cloudSprites){
    c.userData.a += c.userData.sp * dt;
    c.position.x = Math.sin(c.userData.a)*c.userData.r;
    c.position.z = Math.cos(c.userData.a)*c.userData.r;
  }
  seaMeshes[0].rotation.y += dt*.0035;
  seaMeshes[1].rotation.y -= dt*.0021;
  for (const m of seaMeshes) m.material.uniforms.uTime.value = t;
  for (let i=0;i<nameplates.length;i++)
    nameplates[i].position.y = nameplates[i].userData.baseY + Math.sin(t*.6+i)*0.25;

  if (frameI % 7 === 0) checkArea();

  fpsAcc += dt; fpsN++;
  if (fpsAcc >= 1){
    fpsAvg = fpsN/fpsAcc; fpsAcc=0; fpsN=0;
    fpsEl.textContent = fpsAvg.toFixed(0)+' fps · tier '+TIER+' · deg '+degradeStep;
    if (started && fpsAvg < 27 && t-lastDegrade > 6 && degradeStep < 3) degrade(t);
  }

  if (composer && (!bloomPass || bloomPass.enabled)) composer.render();
  else renderer.render(scene, camera);
}

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (composer) composer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(animate);

/* ================================================================
   22. DEBUG / TEST HANDLE  (also phase-2 scroll wiring surface)
================================================================ */
window.__CITY = {
  THREE, scene, camera, player, keys, fruits,
  get pos(){ return [player.pos.x, player.pos.y, player.pos.z]; },
  setPos(x,y,z){ player.pos.set(x,y,z); },
  setYaw(a){ player.yaw = a; },
  lookAt(x,z){ player.yaw = Math.atan2(-(x-player.pos.x), -(z-player.pos.z)); },
  press(code,down){ keys[code] = !!down; },
  get area(){ return curArea; },
  get fps(){ return fpsAvg; },
  get tier(){ return TIER; },
  get degradeStep(){ return degradeStep; },
  begin,
  colliders: { circles:colCircles.length, boxes:colBoxes.length, segs:colSegs.length },
  slots: SLOT_STATUS,
};

} catch(err){
  const e = document.getElementById('err');
  e.style.display = 'block';
  e.textContent = 'ERROR: ' + (err && err.stack || err);
  console.error(err);
}
</script>
